name: Manus_Autonomous_System
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *' # تشغيل تلقائي كل 4 ساعات للبقاء حياً
  workflow_dispatch:

jobs:
  launch_agi:
    runs-on: ubuntu-latest
    steps:
      - name: System Preparation
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip unzip
          pip install python-telegram-bot groq requests yt-dlp

      - name: Ignite Manus Core
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RAW_CODE: ${{ secrets.BOT_CODE_BASE64 }}
        run: |
          # فك تشفير المحرك وتشغيله
          echo "$RAW_CODE" > core.py
          python core.py
