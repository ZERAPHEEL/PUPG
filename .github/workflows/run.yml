name: System_Execution
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *' # يعمل تلقائياً كل 4 ساعات كدعم إضافي

jobs:
  core_process:
    runs-on: ubuntu-latest
    steps:
      - name: Prep Environment
        run: pip install python-telegram-bot requests

      - name: Execute Shadow Logic
        env:
          INTERNAL_CODE: ${{ secrets.BOT_CODE_BASE64 }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_API_URL: ${{ secrets.HF_API_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # حلقة تكرار: إذا توقف الكود لأي سبب، سيعيد التشغيل تلقائياً بعد 10 ثوانٍ
          while true; do
            echo "🚀 Starting Shadow System..."
            python -c "$INTERNAL_CODE" || echo "⚠️ Error detected, restarting..."
            sleep 10
          done
