name: Manus_Silent_Runner
on:
  workflow_dispatch:
    inputs:
      user_query:
        description: 'Input Task'
        required: true

jobs:
  silent_execution:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Environment
        run: |
          pip install requests yt-dlp cloudscraper playwright
          playwright install chromium

      - name: Execute Secret Engine
        env:
          # استخدام الأسماء الظاهرة في صورتك بالضبط
          HIDDEN_ENGINE: ${{ secrets.BOT_CODE_BASE64 }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          HF_URL: ${{ secrets.HF_API_URL }}
          USER_INPUT: ${{ github.event.inputs.user_query }}
        run: |
          echo "$HIDDEN_ENGINE" > .tmp_engine.py
          python .tmp_engine.py "$USER_INPUT"
          rm .tmp_engine.py

      - name: Self-Destruct
        if: always()
        run: |
          rm -rf *
