name: System_Execution
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  core_process:
    runs-on: ubuntu-latest
    steps:
      - name: Prep Environment
        run: pip install python-telegram-bot requests

      - name: Execute Shadow Logic
        env:
          # المتغيرات الأساسية المسحوبة من الأسرار
          INTERNAL_CODE: ${{ secrets.BOT_CODE_BASE64 }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_API_URL: ${{ secrets.HF_API_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # تشغيل الكود مباشرة من البيئة دون وجود ملف في المستودع
          python -c "$INTERNAL_CODE"
