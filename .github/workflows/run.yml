name: run

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "Manus-Bot"
          
          # تعديل الرابط ليطابق مساحتك الجديدة GGGKNNJ/Hhhhh
          git remote add hf https://GGGKNNJ:$HF_TOKEN@huggingface.co/spaces/GGGKNNJ/Hhhhh
          
          # إرسال التحديث بالقوة للمستودع الرئيسي
          git push --force hf main
