name: Silent_Executor
on:
  workflow_dispatch:
    inputs:
      user_query:
        description: 'Input from Bot'
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Install Deps
        run: pip install requests cloudscraper

      - name: Execute Secret Logic
        env:
          # ربط الأسرار بالبيئة لمرة واحدة فقط أثناء التشغيل
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          HF_URL: ${{ secrets.HF_API_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          SECRET_ENGINE: ${{ secrets.BOT_CODE_BASE64 }}
          USER_INPUT: ${{ github.event.inputs.user_query }}
        run: |
          # استخراج وتشغيل الكود من الذاكرة ثم حذفه
          echo "$SECRET_ENGINE" > engine.py
          python engine.py "$USER_INPUT"
          rm engine.py

      - name: Cleanup
        if: always()
        run: rm -rf *
