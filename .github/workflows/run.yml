name: Manus-Zero Autonomous OS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # تشغيل احتياطي كل 6 ساعات
  push:
    branches: [ "main" ]   # إعادة تشغيل فورية عند دمج PR

jobs:
  run-manus-core:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 6 ساعات كاملة

    steps:
      - name: 📥 سحب الكود من المستودع
        uses: actions/checkout@v4

      - name: 🐍 إعداد بيئة بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 تثبيت الحزم الأساسية والاعتماديات
        run: |
          python -m pip install --upgrade pip
          pip install pyTelegramBotAPI requests Pillow
          pip install chromadb sentence-transformers huggingface_hub

      - name: 🔐 فك تشفير العقل التنفيذي من الأسرار
        run: echo "$PROJECT_CORE" > core.py
        env:
          PROJECT_CORE: ${{ secrets.PROJECT_CORE }}

      - name: 🚀 إطلاق وكيل Manus-Zero
        run: python core.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_API_URL: ${{ secrets.HF_API_URL }}
          GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}   # ✅ هذا هو السطر المفقود
          GT_TOKEN: ${{ secrets.GT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
