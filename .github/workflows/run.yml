name: Deploy ZERAPHEEL

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 سحب الكود
        uses: actions/checkout@v4

      - name: 🐍 إعداد بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 تثبيت huggingface_hub
        run: pip install huggingface_hub

      - name: 🚀 نشر المساحة على Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PROJECT_CORE: ${{ secrets.PROJECT_CORE }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python - <<'DEPLOY_SCRIPT'
          import os, sys, time
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          username = api.whoami()["name"]
          space_id = f"{username}/ZERAPHEEL-OS"

          print(f"🚀 نشر المساحة: {space_id}")

          # 1. إنشاء المساحة Docker
          try:
              api.create_repo(repo_id=space_id, repo_type="space", space_sdk="docker", exist_ok=True)
              print("✅ المساحة موجودة/تم إنشاؤها")
          except Exception as e:
              print(f"❌ فشل إنشاء المساحة: {e}")
              sys.exit(1)

          # 2. README
          readme = """---
          title: ZERAPHEEL OS
          emoji: 🚀
          sdk: docker
          app_port: 7860
          ---
          ZERAPHEEL Autonomous Agent"""
          api.upload_file(path_or_fileobj=readme.encode(), path_in_repo="README.md", repo_id=space_id, repo_type="space")

          # 3. Dockerfile
          dockerfile = """FROM ubuntu:22.04
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y curl python3 python3-pip nodejs npm && rm -rf /var/lib/apt/lists/*
          RUN npm install -g openclaw@latest || true
          WORKDIR /app
          COPY requirements.txt .
          RUN pip3 install --upgrade pip && pip3 install -r requirements.txt
          COPY entrypoint.sh /entrypoint.sh
          RUN chmod +x /entrypoint.sh
          EXPOSE 7860
          ENTRYPOINT ["/entrypoint.sh"]"""
          api.upload_file(path_or_fileobj=dockerfile.encode(), path_in_repo="Dockerfile", repo_id=space_id, repo_type="space")

          # 4. requirements.txt
          requirements = """pyTelegramBotAPI
          requests
          Pillow
          chromadb
          sentence-transformers
          google-generativeai
          duckduckgo-search
          wikipedia
          curl_cffi
          beautifulsoup4
          huggingface_hub"""
          api.upload_file(path_or_fileobj=requirements.encode(), path_in_repo="requirements.txt", repo_id=space_id, repo_type="space")

          # 5. entrypoint.sh
          entrypoint = """#!/bin/bash
          echo "$PROJECT_CORE" > /app/core.py
          openclaw gateway start &
          sleep 5
          python3 /app/core.py"""
          api.upload_file(path_or_fileobj=entrypoint.encode(), path_in_repo="entrypoint.sh", repo_id=space_id, repo_type="space")

          print("📂 ملفات Docker رُفعت")

          # 6. أسرار المساحة
          secrets_map = {
              "TELEGRAM_TOKEN": os.environ.get("TELEGRAM_TOKEN"),
              "GEMINI_API_KEY": os.environ.get("GEMINI_API_KEY"),
              "GROQ_API_KEY": os.environ.get("GROQ_API_KEY"),
              "CHAT_ID": os.environ.get("CHAT_ID"),
              "TAVILY_API_KEY": os.environ.get("TAVILY_API_KEY"),
              "PROJECT_CORE": os.environ.get("PROJECT_CORE"),
          }
          for name, value in secrets_map.items():
              if value:
                  try:
                      api.add_space_secret(repo_id=space_id, secret_name=name, secret_value=value)
                      print(f"🔐 {name} تم")
                  except Exception as e:
                      print(f"⚠️ فشل {name}: {e}")

          # 7. تخزين دائم
          try:
              storage_repo = f"{username}/zerapheel-storage"
              api.create_repo(repo_id=storage_repo, repo_type="dataset", exist_ok=True)
              api.request_space_storage(repo_id=space_id, storage_repo=storage_repo, path="/app/memory_db")
              print("💾 تم ربط التخزين الدائم")
          except Exception as e:
              print(f"⚠️ التخزين الدائم: {e}")

          # 8. إعادة تشغيل
          try:
              api.restart_space(repo_id=space_id)
              print("🔄 إعادة تشغيل...")
          except Exception as e:
              print(f"⚠️ إعادة التشغيل: {e}")

          print(f"🎉 نشر ناجح! https://huggingface.co/spaces/{space_id}")
          DEPLOY_SCRIPT
