name: Universal_Stealth_System
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Build and Inject System
        run: |
          # 1. إنشاء Dockerfile مع الحزم المحدثة (حل مشكلة الـ Build Error)
          cat <<EOF > Dockerfile
          FROM python:3.9
          RUN apt-get update && apt-get install -y \\
              chromium \\
              chromium-driver \\
              libgl1 \\
              libglib2.0-0 \\
              ffmpeg \\
              && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          COPY . .
          RUN pip install flask pyTelegramBotAPI selenium requests opencv-python-headless SpeechRecognition pydub
          CMD ["python", "app.py"]
          EOF

          # 2. إنشاء المحرك الرئيسي (app.py) مع حقن الأسرار
          cat <<EOF > app.py
          import os, subprocess
          from flask import Flask
          app = Flask(__name__)

          # حقن الأسرار مباشرة من جيثب
          os.environ['PROJECT_CORE'] = """${{ secrets.PROJECT_CORE }}"""
          os.environ['TELEGRAM_TOKEN'] = "${{ secrets.TELEGRAM_TOKEN }}"
          os.environ['GROQ_API_KEY'] = "${{ secrets.GROQ_API_KEY }}"
          os.environ['GOOGLE_COOKIES'] = """${{ secrets.GOOGLE_COOKIES }}"""

          @app.route('/')
          def health(): return "Workshop Status: Operational"

          # تشغيل العقل الذكي (main.py)
          if os.getenv('PROJECT_CORE'):
              with open("main.py", "w", encoding="utf-8") as f:
                  f.write(os.getenv('PROJECT_CORE'))
              subprocess.Popen(["python", "main.py"])

          if __name__ == "__main__":
              app.run(host="0.0.0.0", port=7860)
          EOF

          # 3. ملف التعريف
          echo -e "---\ntitle: GGGKNNJ\nsdk: docker\nemoji: 🛡️\n---" > README.md

      - name: Force Push to Workshop
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "master@github.com"
          git config --global user.name "Architect"
          git add .
          git commit -m "Fix: Package Dependency Update" || echo "No changes"
          git remote add hf https://GGGKNNJ:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/GGGKNNJ/Hhhhh || true
          git push --force hf main
