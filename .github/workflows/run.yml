name: Manus_Silent_Runner
on:
  workflow_dispatch:
    inputs:
      user_query:
        description: 'Input Task'
        required: true

jobs:
  silent_execution:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Environment
        run: |
          # تثبيت المكتبات الضرورية فقط
          pip install requests yt-dlp cloudscraper playwright
          playwright install chromium

      - name: Execute Secret Engine
        env:
          # استدعاء الكود من السر الذي سميته BOT_CODE_BASE64
          HIDDEN_ENGINE: ${{ secrets.BOT_CODE_BASE64 }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          HF_URL: ${{ secrets.HF_SPACE_URL }}
          USER_INPUT: ${{ github.event.inputs.user_query }}
        run: |
          # تحويل السر إلى ملف مؤقت وتشغيله ثم حذفه فوراً
          echo "$HIDDEN_ENGINE" > .tmp_engine.py
          python .tmp_engine.py "$USER_INPUT"
          rm .tmp_engine.py

      - name: Self-Destruct
        if: always()
        run: |
          # مسح كل الملفات الناتجة والآثار من السيرفر
          rm -rf *
          echo "🧹 البيئة نظيفة تماماً. لا توجد آثار."
