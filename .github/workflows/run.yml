name: System_Execution
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  core_process:
    runs-on: ubuntu-latest
    steps:
      - name: Prep Environment
        run: pip install python-telegram-bot requests

      - name: Execute Shadow Logic
        env:
          # هنا نضع الكود كنص عادي
          RAW_PYTHON_CODE: ${{ secrets.BOT_CODE_BASE64 }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_API_URL: ${{ secrets.HF_API_URL }}
        run: |
          # حفظ الكود في ملف بايثون مباشرة
          echo "$RAW_PYTHON_CODE" > run_bot.py
          
          # تشغيل الحلقة
          while true; do
            echo "🚀 Starting System..."
            python run_bot.py || echo "⚠️ Error, restarting in 10s..."
            sleep 10
          done
