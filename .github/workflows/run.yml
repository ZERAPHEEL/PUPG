name: Manus-Zero Ghost OS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: تشغيل المحرك السيادي
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PROJECT_CORE: ${{ secrets.PROJECT_CORE }}
        run: |
          echo "$PROJECT_CORE" > runner.py
          python3 runner.py
