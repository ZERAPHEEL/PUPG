name: Auto_Ignite_Core

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: Preparing Environment
        run: pip install python-telegram-bot groq

      - name: Executing Shadow Code
        env:
          # جلب الكود كما هو من الخزنة
          RAW_CODE: ${{ secrets.BOT_CODE_BASE64 }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # حفظ الكود في ملف وتشغيله فوراً
          echo "$RAW_CODE" > core.py
          python core.py
