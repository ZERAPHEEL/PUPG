name: Ultimate_Stealth_Memory
on:
  push:
    branches: [main]
  repository_dispatch:
    types: [keep_alive]

jobs:
  overseer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Encryption Tools
        run: pip install pynacl requests

      - name: System Logic & Stealth Memory
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PROJECT_MEMORY: ${{ secrets.PROJECT_MEMORY }}
        run: |
          # تشغيل العقل المدبر
          # سيقوم البوت بقراءة PROJECT_MEMORY من الرام
          # ثم سيقوم بتحديثها برمجياً في نهاية التشغيل
          python main.py

      - name: Trigger Next Cycle
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          sleep 15
          curl -X POST "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -H "Authorization: token $GH_TOKEN" \
            -d '{"event_type": "keep_alive"}'
