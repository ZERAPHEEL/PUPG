name: Manus_Silent_Runner
on:
  workflow_dispatch:
    inputs:
      user_query:
        description: 'Command from Telegram' # الخانة الظاهرة في صورتك
        required: true

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare
        run: pip install requests yt-dlp cloudscraper

      - name: Run Secret Engine
        env:
          # تأكد أن هذه الأسماء مطابقة تماماً لما في الـ Secrets عندك
          BOT_CODE: ${{ secrets.BOT_CODE_BASE64 }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          HF_URL: ${{ secrets.HF_API_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          USER_INPUT: ${{ github.event.inputs.user_query }}
        run: |
          echo "$BOT_CODE" > .engine.py
          python .engine.py "$USER_INPUT"
          rm .engine.py

      - name: Cleanup
        if: always()
        run: rm -rf *
