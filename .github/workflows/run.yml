name: Eternal_Secret_Overseer
on:
  push:
    branches: [main]
  repository_dispatch:
    types: [keep_alive]
  workflow_dispatch:

jobs:
  overseer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Environment
        run: pip install pynacl requests pyTelegramBotAPI

      - name: Inject and Execute Core
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          PROJECT_MEMORY: ${{ secrets.PROJECT_MEMORY }}
          PROJECT_CORE: ${{ secrets.PROJECT_CORE }}
        run: |
          # 1. استخراج كود العقل المدبر من الأسرار إلى ملف main.py
          echo "$PROJECT_CORE" > main.py
          
          # 2. التأكد من وجود ملف app.py للمختبر
          cat <<EOF > app.py
          import os, subprocess
          from flask import Flask
          app = Flask(__name__)
          @app.route('/')
          def h(): return "Lab Active"
          if __name__ == "__main__":
              app.run(host="0.0.0.0", port=7860)
          EOF
          
          # 3. تشغيل العقل (الذي يحدّث الذاكرة برمجياً)
          echo "🚀 البدء في تشغيل العقل المدبر..."
          python main.py

      - name: Keep Alive Pulse
        if: always() # يضمن الاستمرار حتى لو فشل الكود أعلاه
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          sleep 20
          curl -X POST "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"event_type": "keep_alive"}'
