name: Manus_Silent_Runner
on:
  workflow_dispatch:
    inputs:
      user_query:
        description: 'Task Input'
        required: true

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Environment
        run: |
          pip install requests yt-dlp cloudscraper
          # تثبيت الأدوات الأساسية فقط لضمان السرعة القصوى

      - name: Execute Secret Engine
        env:
          # ربط الأسرار من الخزنة (مطابق لأسماء صورتك)
          BOT_ENGINE: ${{ secrets.BOT_CODE_BASE64 }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          HF_URL: ${{ secrets.HF_API_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          USER_INPUT: ${{ github.event.inputs.user_query }}
        run: |
          # تشغيل الكود المخفي من الذاكرة وحذفه فوراً بعد التنفيذ
          echo "$BOT_ENGINE" > .engine.py
          python .engine.py "$USER_INPUT"
          rm .engine.py

      - name: Self-Destruct Cleanup
        if: always()
        run: |
          rm -rf *
          echo "🧹 النظام نظيف تماماً، تم مسح كافة الملفات والآثار."
