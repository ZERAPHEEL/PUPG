name: Manus-Zero Ghost OS

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 🚀 Execution from Secrets
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PROJECT_CORE: ${{ secrets.PROJECT_CORE }}
          PROJECT_MEMORY: ${{ secrets.PROJECT_MEMORY }}
        run: |
          # تنفيذ الكود المخزن في السر مباشرة
          python3 -c "import os; exec(os.getenv('PROJECT_CORE'))"
