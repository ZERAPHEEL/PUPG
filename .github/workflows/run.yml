name: Manus-Zero Autonomous OS

on:
  schedule:
    - cron: '0 */6 * * *' # يعمل تلقائياً كل 6 ساعات لضمان استمرار النبض
  workflow_dispatch: # يتيح لك تشغيله يدوياً من جيثب أو عبر شفرة ZERAFEL

jobs:
  build:
    runs-on: ubuntu-latest
    
    # تحديد المدة القصوى للتشغيل (جيثب يعطي حتى 6 ساعات)
    timeout-minutes: 350 

    steps:
      - name: 📥 سحب الكود من المستودع
        uses: actions/checkout@v3

      - name: 🐍 إعداد بيئة بايثون
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 تثبيت المكتبات الأساسية والمتصفح البصري
        run: |
          python -m pip install --upgrade pip
          pip install pyTelegramBotAPI groq pynacl requests playwright pillow
          # تثبيت محرك كروميوم اللازم للتصفح البصري (OpenClaw Style)
          playwright install chromium
          playwright install-deps chromium

      - name: ⚙️ تشغيل Manus-Zero (العقل والجسد)
        env:
          # ربط الأسرار المخزنة في جيثب بالكود
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # استدعاء الذاكرة المشفرة إن وجدت
          PROJECT_MEMORY: ${{ secrets.PROJECT_MEMORY }}
        run: |
          # تشغيل الملف الأساسي الذي يحتوي على الكود الموحد
          python run.py
