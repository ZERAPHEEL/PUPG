name: Manus-Zero Autonomous OS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'  # إعادة تشغيل تلقائية كل 5 ساعات لمنع التوقف

jobs:
  run-manus-core:
    runs-on: ubuntu-latest
    timeout-minutes: 340  # 5 ساعات و40 دقيقة (الحد الأقصى قبل إعادة التشغيل)
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyTelegramBotAPI google-generativeai requests Pillow

      - name: Deploy Project Core
        run: echo "$PROJECT_CORE" > core.py
        env:
          PROJECT_CORE: ${{ secrets.PROJECT_CORE }}

      - name: Launch Manus-Zero
        run: python core.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES }}
