name: run

on:
  push:
    branches: [ main ]
  workflow_dispatch: # للتشغيل اليدوي من الهاتف

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install HF CLI
        run: pip install huggingface_hub

      - name: Deploy and Sync Secrets
        env:
          # سحب التوكن والروابط من أسرار جيثب (الموجودة في صورتك)
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_URL: ${{ secrets.HF_API_URL }}
          # الأسرار الأخرى التي سيتم تمريرها للتطبيق
          COOKIES: ${{ secrets.GOOGLE_COOKIES }}
          BOT_CODE: ${{ secrets.BOT_CODE_BASE64 }}
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          # إعداد الهوية لرفع الملفات
          git config --global user.email "bot@github.com"
          git config --global user.name "Manus-Bot"
          
          # استخراج اسم المستخدم والمستودع من الرابط الموجود في أسرارك
          # ملاحظة: تأكد أن HF_API_URL يحتوي على رابط الـ Space
          git remote add hf https://user:$HF_TOKEN@huggingface.co/spaces/ZERAPHEEL/PUPG
          
          # رفع الأكواد (app.py, Dockerfile, etc) إلى هوجينج فيس
          git push --force hf main
