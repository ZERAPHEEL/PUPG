name: System_Execution
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  core_process:
    runs-on: ubuntu-latest
    steps:
      - name: Prep Environment
        run: pip install python-telegram-bot requests

      - name: Execute Shadow Logic
        env:
          INTERNAL_CODE_B64: ${{ secrets.BOT_CODE_BASE64 }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_API_URL: ${{ secrets.HF_API_URL }}
        run: |
          # فك تشفير الكود من Base64 وحفظه في ملف مؤقت
          echo "$INTERNAL_CODE_B64" | base64 -d > run_bot.py
          
          # حلقة التشغيل التلقائي
          while true; do
            echo "🚀 Starting Shadow System from File..."
            python run_bot.py || echo "⚠️ Error detected, restarting in 10s..."
            sleep 10
          done
