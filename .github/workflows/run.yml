name: Manus-Zero Autonomous OS

on:
  workflow_dispatch: # تشغيل يدوي من صفحة Actions

jobs:
  launch-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up System Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.10'

      - name: Install Compute Engines
        run: |
          pip install pyTelegramBotAPI google-generativeai requests g4f Pillow

      - name: Deploy Core Logic
        run: echo "$PROJECT_CORE" > core.py
        env:
          PROJECT_CORE: ${{ secrets.PROJECT_CORE }}

      - name: Start Manus-Zero
        run: python core.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES }}
