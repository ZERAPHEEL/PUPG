name: Intelligent_Overseer_v2
on:
  push:
    branches: [main]
  schedule:
    - cron: '*/15 * * * *' # يشتغل تلقائياً كل 15 دقيقة للفحص
  workflow_dispatch:

jobs:
  monitor_and_repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Health Check & Groq Analysis
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. فحص حالة المختبر في هوجينج فيس
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://huggingface.co/spaces/GGGKNNJ/Hhhhh)
          
          if [ $STATUS -ne 200 ]; then
            echo "⚠️ المختبر متوقف أو به خلل (Status: $STATUS)"
            
            # 2. استدعاء ذكاء جروك لتشخيص المشكلة (أتمتة القرار)
            REPAIR_STRATEGY=$(curl -X POST "https://api.groq.com/openai/v1/chat/completions" \
              -H "Authorization: Bearer $GROQ_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{
                "model": "llama-3.3-70b-versatile",
                "messages": [{"role": "system", "content": "You are a DevOps AI. The HuggingFace Space is down with status '$STATUS'. Suggest a repair: REDEPLOY or REBOOT."}, 
                             {"role": "user", "content": "Fix it."}]
              }' | jq -r '.choices[0].message.content')

            echo "🧠 قرار جروك: $REPAIR_STRATEGY"
            
            # 3. تنفيذ الإصلاح آلياً
            if [[ "$REPAIR_STRATEGY" == *"REDEPLOY"* ]]; then
               echo "🛠️ جاري إعادة بناء المصنع بالكامل..."
               # (هنا نضع كود الـ git push force الذي استخدمناه سابقاً)
            fi
          else
            echo "✅ النظام يعمل بكفاءة، لا داعي للتدخل."
          fi
