name: run

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "Manus-Bot"
          
          # حذف أي ريموت قديم وإضافة الرابط الصحيح
          git remote rm hf || true
          git remote add hf https://GGGKNNJ:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/GGGKNNJ/Hhhhh
          
          # الرفع بطريقة تضمن أن الملفات في الـ Root (الواجهة الرئيسية)
          # سنقوم برفع الفرع الحالي مباشرة إلى الفرع main في هوجينج فيس
          git push --force hf main:main
