name: Ultimate_Stealth_System
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Build System Files
        run: |
          # 1. إنشاء Dockerfile
          cat <<EOF > Dockerfile
          FROM python:3.9
          RUN apt-get update && apt-get install -y \\
              chromium \\
              chromium-driver \\
              libgl1-mesa-glx \\
              libglib2.0-0 \\
              ffmpeg \\
              && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          COPY . .
          RUN pip install flask pyTelegramBotAPI selenium requests opencv-python-headless SpeechRecognition pydub
          CMD ["python", "app.py"]
          EOF

          # 2. إنشاء المحرك (app.py) وحقن الأسرار مباشرة من جيثب
          cat <<EOF > app.py
          import os, subprocess
          from flask import Flask
          app = Flask(__name__)
          
          # حقن الأسرار برمجياً (تنتقل من جيثب للملف مباشرة)
          os.environ['PROJECT_CORE'] = """${{ secrets.PROJECT_CORE }}"""
          os.environ['TELEGRAM_TOKEN'] = "${{ secrets.TELEGRAM_TOKEN }}"
          os.environ['GROQ_API_KEY'] = "${{ secrets.GROQ_API_KEY }}"
          os.environ['GOOGLE_COOKIES'] = """${{ secrets.GOOGLE_COOKIES }}"""

          @app.route('/')
          def h(): return "Workshop Active - Secure Bridge"
          
          # تشغيل العقل
          with open("main.py", "w", encoding="utf-8") as f:
              f.write(os.environ['PROJECT_CORE'])
          
          subprocess.Popen(["python", "main.py"])
          
          if __name__ == "__main__":
              app.run(host="0.0.0.0", port=7860)
          EOF

          # 3. ملف الهوية
          echo -e "---\ntitle: GGGKNNJ\nsdk: docker\n---" > README.md

      - name: Push to HF Workshop
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "master@github.com"
          git config --global user.name "Architect"
          git add .
          git commit -m "Secure Injection Deployment" || echo "No changes"
          git remote add hf https://GGGKNNJ:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/GGGKNNJ/Hhhhh || true
          git push --force hf main
